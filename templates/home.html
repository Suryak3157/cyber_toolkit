<!DOCTYPE html>
<html>
<head>
    <title>Case Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-green-400 flex items-center justify-center h-screen font-mono">

    <div class="bg-gray-900 p-10 rounded-xl border border-green-500 w-96">
        
        <h1 class="text-2xl text-green-500 mb-6 text-center font-bold">
            CYBER FORENSIC CASE
        </h1>

        <form method="POST">

            <label class="block mb-2">Case Number</label>
            <input type="text" name="case_number" required
                class="w-full p-2 mb-4 bg-black border border-green-500 text-green-400 rounded">

            <label class="block mb-2">Person Name</label>
            <input type="text" name="person_name" required
                class="w-full p-2 mb-6 bg-black border border-green-500 text-green-400 rounded">

            <button type="submit"
                class="w-full bg-green-500 text-black font-bold py-2 rounded hover:bg-green-400">
                Start Investigation
            </button>

        </form>
    </div>

</body>
</html>
